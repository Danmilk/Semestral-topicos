name: "3 — Deployment"

on:
  workflow_run:
    workflows: ["2 — Build & Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de imagen a desplegar (dejar vacío para 'latest')"
        required: false
        default: "latest"

jobs:
  deploy:
    name: Desplegar a Azure Container Instance
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar artefacto con tag de imagen
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolver tag de imagen
        id: tag
        run: |
          if (Test-Path image_tag.txt) {
            $TAG = (Get-Content image_tag.txt).Trim()
          } else {
            $TAG = "${{ github.event.inputs.image_tag }}"
            if (-not $TAG) { $TAG = "latest" }
          }
          echo "tag=$TAG" >> $env:GITHUB_OUTPUT
          Write-Host "Desplegando tag: $TAG"

      - name: Seleccionar suscripción de Azure
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Obtener credenciales de ACR
        id: acr_creds
        run: |
          $ACR_USER = az acr credential show -n acrfinalproject --query username -o tsv
          $ACR_PASS = az acr credential show -n acrfinalproject --query passwords[0].value -o tsv
          echo "acr_user=$ACR_USER" >> $env:GITHUB_OUTPUT
          Write-Host "::add-mask::$ACR_PASS"
          echo "acr_pass=$ACR_PASS" >> $env:GITHUB_OUTPUT

      - name: Crear o actualizar ACI
        run: |
          $TAG = "${{ steps.tag.outputs.tag }}"
          az container create `
            --resource-group rg-finalproject-dev `
            --name aci-finalproject `
            --image "acrfinalproject.azurecr.io/finalproject:$TAG" `
            --registry-login-server acrfinalproject.azurecr.io `
            --registry-username ${{ steps.acr_creds.outputs.acr_user }} `
            --registry-password ${{ steps.acr_creds.outputs.acr_pass }} `
            --cpu 1 `
            --memory 1.5 `
            --ports 8080 `
            --ip-address Public `
            --os-type Linux `
            --environment-variables NODE_ENV=production PORT=8080 APP_VERSION=$TAG `
            --restart-policy Always

      - name: Obtener IP del contenedor
        id: get_ip
        run: |
          $IP = az container show `
            --resource-group rg-finalproject-dev `
            --name aci-finalproject `
            --query ipAddress.ip -o tsv
          echo "ip=$IP" >> $env:GITHUB_OUTPUT
          Write-Host "IP del contenedor: $IP"

      - name: Health check
        run: |
          $IP = "${{ steps.get_ip.outputs.ip }}"
          for ($i = 1; $i -le 10; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://${IP}:8080/health" -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                Write-Host "Health check OK en intento $i"
                exit 0
              }
            } catch {
              Write-Host "Intento ${i}: sin respuesta - esperando 15s..."
            }
            Start-Sleep -Seconds 15
          }
          Write-Host "Health check fallo despues de 10 intentos"
          exit 1

      - name: Mostrar URL de acceso
        run: |
          Write-Host "==========================="
          Write-Host "Despliegue exitoso"
          Write-Host "Tag: ${{ steps.tag.outputs.tag }}"
          Write-Host "App: http://${{ steps.get_ip.outputs.ip }}:8080"
          Write-Host "==========================="
