name: "3 — Deployment"

on:
  workflow_run:
    workflows: ["2 — Build & Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag de imagen a desplegar (dejar vacío para 'latest')"
        required: false
        default: "latest"

jobs:
  deploy:
    name: Desplegar a Azure Container Instance
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar artefacto con tag de imagen
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolver tag de imagen
        id: tag
        shell: bash
        run: |
          if [ -f image_tag.txt ]; then
            TAG=$(cat image_tag.txt)
          else
            TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Desplegando tag: $TAG"

      - name: Seleccionar suscripción de Azure
        shell: bash
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Obtener credenciales de ACR
        id: acr_creds
        shell: bash
        run: |
          ACR_USER=$(az acr credential show -n acrfinalproject --query username -o tsv)
          ACR_PASS=$(az acr credential show -n acrfinalproject --query passwords[0].value -o tsv)
          echo "acr_user=$ACR_USER" >> $GITHUB_OUTPUT
          echo "::add-mask::$ACR_PASS"
          echo "acr_pass=$ACR_PASS" >> $GITHUB_OUTPUT

      - name: Crear o actualizar ACI
        shell: bash
        run: |
          az container create \
            --resource-group rg-finalproject-dev \
            --name aci-finalproject \
            --image acrfinalproject.azurecr.io/finalproject:${{ steps.tag.outputs.tag }} \
            --registry-login-server acrfinalproject.azurecr.io \
            --registry-username ${{ steps.acr_creds.outputs.acr_user }} \
            --registry-password ${{ steps.acr_creds.outputs.acr_pass }} \
            --cpu 1 \
            --memory 1.5 \
            --ports 3000 \
            --ip-address Public \
            --os-type Linux \
            --environment-variables NODE_ENV=production PORT=3000 APP_VERSION=${{ steps.tag.outputs.tag }} \
            --restart-policy Always

      - name: Obtener IP del contenedor
        id: get_ip
        shell: bash
        run: |
          IP=$(az container show \
            --resource-group rg-finalproject-dev \
            --name aci-finalproject \
            --query ipAddress.ip -o tsv)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "IP del contenedor: $IP"

      - name: Health check
        shell: bash
        run: |
          IP="${{ steps.get_ip.outputs.ip }}"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${IP}:3000/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check exitoso en intento $i"
              exit 0
            fi
            echo "Intento $i: HTTP $STATUS — esperando 15s..."
            sleep 15
          done
          echo "Health check falló después de 10 intentos"
          exit 1

      - name: Mostrar URL de acceso
        shell: bash
        run: |
          echo "==========================="
          echo "Despliegue exitoso"
          echo "Tag: ${{ steps.tag.outputs.tag }}"
          echo "App: http://${{ steps.get_ip.outputs.ip }}:3000"
          echo "==========================="
