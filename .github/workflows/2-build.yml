name: "2 — Build & Publish"

on:
  workflow_run:
    workflows: ["1 — Infrastructure (IaC)"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build Docker Image y Push a ACR
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}

    defaults:
      run:
        shell: powershell

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Generar tag de imagen (SHA corto)
        id: meta
        run: |
          $SHORT_SHA = "${{ github.sha }}".Substring(0, 7)
          echo "image_tag=$SHORT_SHA" >> $env:GITHUB_OUTPUT
          Write-Host "Tag de imagen: $SHORT_SHA"

      - name: Seleccionar suscripción de Azure
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login en ACR
        run: az acr login --name acrfinalproject

      - name: Build imagen Docker (incluye tests en multi-stage)
        run: |
          $TAG = "${{ steps.meta.outputs.image_tag }}"
          docker build `
            --build-arg APP_VERSION=$TAG `
            -t "acrfinalproject.azurecr.io/finalproject:$TAG" `
            -t "acrfinalproject.azurecr.io/finalproject:latest" `
            .

      - name: Push imagen a ACR
        run: |
          $TAG = "${{ steps.meta.outputs.image_tag }}"
          docker push "acrfinalproject.azurecr.io/finalproject:$TAG"
          docker push "acrfinalproject.azurecr.io/finalproject:latest"

      - name: Guardar tag como artefacto
        run: |
          "${{ steps.meta.outputs.image_tag }}" | Out-File -FilePath image_tag.txt -NoNewline

      - name: Upload artefacto image_tag
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image_tag.txt
          retention-days: 1

      - name: Mostrar imagen publicada
        run: |
          Write-Host "=== Imagen publicada en ACR ==="
          Write-Host "acrfinalproject.azurecr.io/finalproject:${{ steps.meta.outputs.image_tag }}"
