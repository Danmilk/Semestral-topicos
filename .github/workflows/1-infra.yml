name: "1 — Infrastructure (IaC)"

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  TF_VERSION: "1.8.4"
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_ACCESS_KEY:      ${{ secrets.TF_BACKEND_KEY }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: self-hosted

    outputs:
      acr_login_server: ${{ steps.tf_output.outputs.acr_login_server }}
      aci_ip_address:   ${{ steps.tf_output.outputs.aci_ip_address }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Seleccionar suscripción de Azure
        shell: bash
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        shell: bash
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        shell: bash
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan
        shell: bash
        run: terraform plan -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        shell: bash
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Capturar outputs de Terraform
        id: tf_output
        shell: bash
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "aci_ip_address=$(terraform output -raw aci_ip_address)" >> $GITHUB_OUTPUT
        working-directory: terraform

      - name: Mostrar recursos creados
        shell: bash
        run: |
          echo "=== Infraestructura creada ==="
          terraform output -raw acr_login_server
          terraform output -raw app_url
        working-directory: terraform
