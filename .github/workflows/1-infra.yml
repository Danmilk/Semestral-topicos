name: "1 — Infrastructure (IaC)"

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  TF_VERSION: "1.8.4"
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_ACCESS_KEY:      ${{ secrets.TF_BACKEND_KEY }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: self-hosted

    defaults:
      run:
        shell: powershell

    outputs:
      acr_login_server: ${{ steps.tf_output.outputs.acr_login_server }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Seleccionar suscripción de Azure
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache providers de Terraform
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ env.TF_VERSION }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-${{ env.TF_VERSION }}-

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform

      - name: Capturar outputs de Terraform
        id: tf_output
        run: |
          $acr = terraform output -raw acr_login_server
          echo "acr_login_server=$acr" >> $env:GITHUB_OUTPUT
        working-directory: terraform

      - name: Mostrar recursos creados
        run: |
          Write-Host "=== Infraestructura creada ==="
          Write-Host "ACR: $(terraform output -raw acr_login_server)"
          Write-Host "VNet ID: $(terraform output -raw vnet_id)"
        working-directory: terraform
